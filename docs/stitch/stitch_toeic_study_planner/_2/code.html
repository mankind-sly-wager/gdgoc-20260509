<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TOEIC Success Planner - Setup Wizard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary": "#002045",
                      "surface-bright": "#f7fafc",
                      "surface-container-highest": "#e0e3e5",
                      "secondary-fixed-dim": "#ffb783",
                      "on-surface": "#181c1e",
                      "surface-container-lowest": "#ffffff",
                      "error": "#ba1a1a",
                      "inverse-primary": "#adc7f7",
                      "on-primary-fixed-variant": "#2d476f",
                      "on-tertiary-fixed": "#001d37",
                      "on-tertiary-container": "#58a2f0",
                      "surface-container-low": "#f1f4f6",
                      "on-background": "#181c1e",
                      "background": "#f7fafc",
                      "surface-tint": "#455f88",
                      "surface-container": "#ebeef0",
                      "on-tertiary-fixed-variant": "#00497e",
                      "on-tertiary": "#ffffff",
                      "outline-variant": "#c4c6cf",
                      "on-secondary": "#ffffff",
                      "secondary-container": "#fe9743",
                      "outline": "#74777f",
                      "tertiary-fixed-dim": "#9fcaff",
                      "inverse-surface": "#2d3133",
                      "on-primary-container": "#86a0cd",
                      "surface-variant": "#e0e3e5",
                      "secondary": "#944b00",
                      "on-primary-fixed": "#001b3c",
                      "tertiary-fixed": "#d2e4ff",
                      "on-error": "#ffffff",
                      "secondary-fixed": "#ffdcc5",
                      "surface-container-high": "#e5e9eb",
                      "primary-fixed-dim": "#adc7f7",
                      "primary-container": "#1a365d",
                      "surface-dim": "#d7dadc",
                      "on-secondary-fixed": "#301400",
                      "on-secondary-fixed-variant": "#703700",
                      "on-error-container": "#93000a",
                      "inverse-on-surface": "#eef1f3",
                      "surface": "#f7fafc",
                      "on-surface-variant": "#43474e",
                      "primary-fixed": "#d6e3ff",
                      "error-container": "#ffdad6",
                      "tertiary-container": "#003762",
                      "on-secondary-container": "#6b3500",
                      "on-primary": "#ffffff",
                      "tertiary": "#00213e"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "md": "16px",
                      "xs": "4px",
                      "gutter": "16px",
                      "lg": "24px",
                      "margin-desktop": "48px",
                      "xl": "32px",
                      "unit": "4px",
                      "margin-mobile": "16px",
                      "sm": "8px"
              },
              "fontFamily": {
                      "label-md": ["Inter"],
                      "body-sm": ["Inter"],
                      "display-lg": ["Inter"],
                      "headline-md": ["Inter"],
                      "body-lg": ["Inter"],

                      "label-lg": ["Inter"],
                      "body-md": ["Inter"],

              },
              "fontSize": {

                      "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],

                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],

                      "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]

          }
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-sans antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Simple Header for Transactional Screen -->
<header class="w-full flex items-center justify-between px-margin-mobile md:px-margin-desktop py-md h-16 z-50">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors text-primary">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<div class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-widest">Setup Wizard</div>
<div class="w-10 h-10"></div> <!-- Spacer to center the title -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-lg w-full max-w-3xl mx-auto">
<!-- Hero / Encouraging Copy -->
<div class="text-center mb-xl w-full">
<div class="w-20 h-20 mx-auto mb-md bg-primary-fixed rounded-2xl flex items-center justify-center shadow-lg rotate-3 transform transition-transform hover:rotate-0 duration-300">
<span class="material-symbols-outlined text-[40px] text-primary" style="font-variation-settings: 'FILL' 1;">target</span>
</div>
<h1 class="font-headline-lg text-headline-lg md:font-display-lg md:text-display-lg text-primary mb-sm">Chart Your Course</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-lg mx-auto">
                Every great achievement starts with a clear plan. Tell us where you are and where you want to be, and we'll map out the smartest route to your target TOEIC score.
            </p>
</div>
<!-- Form Card (Bento/Glassmorphism inspired clean look) -->
<div class="w-full bg-surface-container-lowest rounded-[24px] shadow-[0px_4px_12px_rgba(26,54,93,0.06)] border border-surface-container-high p-lg md:p-xl flex flex-col gap-lg relative overflow-hidden">
<!-- Subtle decorative background element -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-fixed opacity-30 rounded-full blur-3xl pointer-events-none"></div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg relative z-10">
<!-- Current Score Input -->
<div class="flex flex-col gap-xs group">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">analytics</span>
                        Current Score
                    </label>
<div class="relative">
<input class="w-full border border-outline-variant rounded-xl px-md py-sm font-body-lg text-body-lg text-on-surface bg-surface-container-lowest focus:border-primary focus:ring-2 focus:ring-primary-fixed focus:outline-none transition-all duration-200 hover:border-primary-container" max="990" min="10" placeholder="e.g. 550" type="number"/>
</div>
</div>
<!-- Target Score Input -->
<div class="flex flex-col gap-xs group">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">flag</span>
                        Target Score
                    </label>
<div class="relative">
<input class="w-full border border-outline-variant rounded-xl px-md py-sm font-body-lg text-body-lg text-primary bg-surface-container-lowest focus:border-primary focus:ring-2 focus:ring-primary-fixed focus:outline-none transition-all duration-200 hover:border-primary-container font-semibold" max="990" min="10" placeholder="e.g. 850" type="number"/>
</div>
</div>
<!-- Test Date Input -->
<div class="flex flex-col gap-xs md:col-span-2 group">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">calendar_month</span>
                        Test Date
                    </label>
<div class="relative">
<input class="w-full border border-outline-variant rounded-xl px-md py-sm font-body-lg text-body-lg text-on-surface bg-surface-container-lowest focus:border-primary focus:ring-2 focus:ring-primary-fixed focus:outline-none transition-all duration-200 hover:border-primary-container cursor-pointer" type="date"/>
</div>
</div>
<!-- Daily Study Time Slider -->
<div class="flex flex-col gap-xs md:col-span-2 mt-sm">
<div class="flex justify-between items-end mb-xs">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">timer</span>
                            Daily Study Time
                        </label>
<span class="font-headline-md text-headline-md text-primary bg-surface-container px-sm py-1 rounded-lg">60 <span class="font-label-md text-label-md text-on-surface-variant">mins</span></span>
</div>
<div class="relative w-full h-8 flex items-center group">
<!-- Custom styled slider -->
<input class="w-full h-2 bg-surface-container-highest rounded-full appearance-none cursor-pointer outline-none focus:ring-2 focus:ring-primary-fixed focus:ring-offset-2 focus:ring-offset-surface-container-lowest relative z-10 [&amp;::-webkit-slider-thumb]:appearance-none [&amp;::-webkit-slider-thumb]:w-6 [&amp;::-webkit-slider-thumb]:h-6 [&amp;::-webkit-slider-thumb]:bg-primary [&amp;::-webkit-slider-thumb]:border-4 [&amp;::-webkit-slider-thumb]:border-surface-container-lowest [&amp;::-webkit-slider-thumb]:rounded-full [&amp;::-webkit-slider-thumb]:shadow-md [&amp;::-webkit-slider-thumb]:transition-transform hover:[&amp;::-webkit-slider-thumb]:scale-110" max="240" min="15" step="15" type="range" value="60"/>
<!-- Visual track fill (mocked via gradient logic or just standard thumb) -->
</div>
<div class="flex justify-between w-full font-label-md text-label-md text-outline mt-1 px-1">
<span>15m</span>
<span>1h</span>
<span>2h</span>
<span>4h+</span>
</div>
</div>
</div>
<hr class="border-outline-variant my-sm opacity-50 relative z-10"/>
<!-- Primary Action -->
<div class="relative z-10 pt-sm">
<button class="w-full bg-secondary-container text-on-tertiary font-label-lg text-label-lg py-4 rounded-xl shadow-[0_4px_14px_0_rgba(254,151,67,0.39)] hover:shadow-[0_6px_20px_rgba(254,151,67,0.23)] hover:bg-[#f98a2f] transform transition-all duration-200 active:scale-[0.98] flex justify-center items-center gap-sm">
<span class="text-[16px] tracking-wide">Generate Study Plan</span>
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</button>
<p class="text-center font-body-sm text-body-sm text-on-surface-variant mt-md flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[16px] text-outline">lock</span>
                    Your data is secure and used only to personalize your experience.
                </p>
</div>
</div>
</main>
</body></html>
